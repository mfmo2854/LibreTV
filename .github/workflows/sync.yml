name: Sync Fork Every 8 Hours

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Add upstream repo
        run: git remote add upstream https://github.com/bestZwei/LibreTV.git

      - name: Fetch upstream changes
        run: git fetch upstream

      - name: Merge upstream/main into your fork's main branch
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories -m "Sync from upstream"

      - name: Push changes back to your repo
        run: git push origin main
